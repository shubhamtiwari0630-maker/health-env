name: health-monitoring-env
version: 1.0

description: AI environment for health monitoring and decision making

environment:
  state_space:
    heart_rate:
      type: integer
      min: 0
      max: 200
    temperature:
      type: float
      min: 30.0
      max: 45.0

  action_space:
    type: discrete
    actions:
      - 0: do_nothing
      - 1: send_warning
      - 2: emergency_alert

  reward_range:
    min: 0.0
    max: 1.0

tasks:
  - name: easy
    description: Detect high heart rate
    success_condition: heart_rate > 100

  - name: medium
    description: Detect increasing trend
    success_condition: heart_rate shows continuous increase

  - name: hard
    description: Multi-sensor decision
    success_condition: heart_rate > 120 OR temperature > 39

api:
  reset: /reset
  step: /step
  state: /state
